<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revelation - Mohammed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  perspective:2000px;
}

.page{
  width:794px;
  height:1123px;
  position:relative;
}

.cover{
  position:absolute;
  width:100%;
  height:100%;
  background:#cfe8ff;
  transform-origin:left;
  transition:transform 1.5s ease, background 1s ease;
  z-index:5;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.flip .cover{
  transform:rotateY(-180deg);
  background:#cfe8ff; /* backside color same as front */
}

.name{
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Alex Brush',cursive;
  font-size:110px;
  color:#1e3c72;
}

.banner{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60%;
  height:80px;
  background:linear-gradient(90deg,gold,#c9a000);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:30px;
  color:#000;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
  position:relative;
  overflow:hidden;
}

.banner-watermark{
  position:absolute;
  font-size:70px;
  color:rgba(0,0,0,0.08);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ribbon{
  position:absolute;
  top:50%;
  left:0;
  width:100%;
  height:18px;
  transform:translateY(-50%);
  z-index:6;

  /* fabric ribbon (no visible box edges) */
  background:
    linear-gradient(90deg,#6e0000,#ff2a2a,#6e0000),
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.08) 0px,
      rgba(255,255,255,0.08) 2px,
      transparent 2px,
      transparent 6px
    );
  background-blend-mode:overlay;

  /* remove hard edges */
  box-shadow:none;
  border-radius:0;

  /* soft edge blending */
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
}

/* Ribbon split effect */
.cut .ribbon{
  background:transparent;
}

.ribbon::before,
.ribbon::after{
  content:"";
  position:absolute;
  width:50%;
  height:100%;
  background:inherit;
  top:0;
  transition:transform 0.6s ease;
}

.ribbon::before{left:0}
.ribbon::after{right:0}

.cut .ribbon::before{
  transform:translateX(-100%);
}

.cut .ribbon::after{
  transform:translateX(100%);
}

/* Bow image (seamless integration) */
.bow{
  position:absolute;
  top:52%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  cursor:pointer;
  z-index:7;
  transition:transform 0.4s ease, opacity 0.4s ease;

  mix-blend-mode:multiply;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
}

/* Bow split effect */
.cut .bow{
  transform:translate(-50%,-50%) scale(0.8);
  opacity:0;
}




/* Second page styles */
.portfolio{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  z-index:1;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

</style>
</head>
<body>

<div class="page" id="page">

  

  <div class="cover">
    <div class="name">Mohammed</div>
    <div class="banner">Revelation<span class="banner-watermark">Revelation</span></div>

    <!-- Ribbon + Bow INSIDE page -->
    <div class="ribbon"></div>
    <img src="bow.png" class="bow" onclick="openPage()">
  </div>

  <!-- Second Page (Portfolio) -->
  <div class="portfolio">
    <iframe src="mam.html"></iframe>
  </div>

</div>

<script>
function openPage(){
  const page = document.getElementById('page');
  page.classList.add('cut');

  setTimeout(()=>{
    page.classList.add('flip');
  },600);
}
</script>

</body>
</html>
